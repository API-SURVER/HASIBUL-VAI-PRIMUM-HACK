  <div id="countdown">--</div>
  <div id="predicted">WAIT</div>
</div>

<script>
/* ===== DRAG (PC + MOBILE) ===== */
const box = document.getElementById("box");
let drag=false, ox=0, oy=0;

function start(x,y){
  drag=true;
  ox=x-box.offsetLeft;
  oy=y-box.offsetTop;
}
function move(x,y){
  if(!drag) return;
  let nx=x-ox;
  let ny=y-oy;

  if(nx<0) nx=0;
  if(ny<0) ny=0;
  if(nx+box.offsetWidth>innerWidth) nx=innerWidth-box.offsetWidth;
  if(ny+box.offsetHeight>innerHeight) ny=innerHeight-box.offsetHeight;

  box.style.left=nx+"px";
  box.style.top=ny+"px"; 
  box.style.right="auto";
  box.style.bottom="auto";
}
function stop(){ drag=false; }

box.addEventListener("mousedown",e=>start(e.clientX,e.clientY));
document.addEventListener("mousemove",e=>move(e.clientX,e.clientY));
document.addEventListener("mouseup",stop);

box.addEventListener("touchstart",e=>{
  let t=e.touches[0];
  start(t.clientX,t.clientY);
});
document.addEventListener("touchmove",e=>{
  let t=e.touches[0];
  move(t.clientX,t.clientY);
});
document.addEventListener("touchend",stop);

/* ===== RANDOM SIGNAL FUNCTION ===== */
function getRandomSignal() { 
  return Math.random() > 0.5 ? "SMALL" : "BIG"; 
}

/* ===== SIGNAL LOGIC ===== */
let last=-1;
requestAnimationFrame(loop);

function loop(){
  let now=new Date();
  let ms=now.getTime();
  let id=Math.floor(ms/30000);

  if(id!==last){
    last=id;
    signal();
  }

  let cd=30-(ms%30000)/1000;
  document.getElementById("countdown").innerHTML=Math.ceil(cd)+"s";
  document.getElementById("currentTime").innerHTML=now.toLocaleTimeString();
  requestAnimationFrame(loop);
}

function signal(){
  // Use the random signal function
  let r = getRandomSignal();
  let el=document.getElementById("predicted");

  el.style.opacity=0;
  setTimeout(()=>{
    el.innerHTML=r;
    el.className=r.includes("BIG")?"big":"small";
    el.style.opacity=1;
  },200);
}
</script>
